      atomistic_preparation_notes: keep this as a representative anticoagulant sentinel until you choose a single exact antithrombin-binding pentasaccharide, because multiple 3-O-sulfated heparin or fondaparinux-like sequences can satisfy the current motif-level description
    simulation_annotations:
      docking_role: anticoagulant_risk_sentinel
      md_priority: high
      selectivity_comparison_group: initial_hs_panel_v1
      expected_relative_affinity: high
      benchmark_tags:
