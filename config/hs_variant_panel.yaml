    display_name: HS dp4 NAc
    gag_class: HS
    panel_role: baseline_negative_control
    chain_length:
      degree_of_polymerization: 4
      residue_count: 4
      disaccharide_equivalents: 2.0
      length_bucket: short_oligo
    sulfation_pattern:
      label: no sulfation (heparosan-like)
      n_sulfation_count: 0
      o2_sulfation_count: 0
      o3_sulfation_count: 0
      o6_sulfation_count: 0
      total_sulfates: 0
      contains_3_o_sulfation: false
    structural_annotations:
      definition_status: residue_sequence_defined
      residue_sequence_template:
        - GlcA
        - GlcNAc
        - GlcA
        - GlcNAc
      uronic_acid_composition:
        GlcA: 2
        IdoA: 0
        IdoA2S: 0
      glucosamine_composition:
        GlcNAc: 2
        GlcNS: 0
        GlcNAc6S: 0
        GlcNS6S: 0
        GlcNS3S: 0
        GlcNS3S6S: 0
      representative_formal_charge_at_ph_7_4: -2
      glytoucan_accession: null
      canonical_wurcs: WURCS=2.0/2,4,3/[a2122A-1a_1-5][a2122h-1b_1-5_2*NCC/3=O]/1-2-1-2/a4-b1_b3-c1_c4-d1
      atomistic_preparation_status: canonical_wurcs_defined_accession_unavailable
      atomistic_preparation_notes: canonical WURCS resolved from an explicit GlycoCT representative sequence via GlyCosmos; no GlyTouCan accession was returned, so validate reducing-end treatment before production docking or MD
    simulation_annotations:
      docking_role: negative_control
      md_priority: low
      selectivity_comparison_group: initial_hs_panel_v1
      expected_relative_affinity: low
      benchmark_tags:
        - charge_control
        - unsulfated_reference
      rationale: negative control for charge-driven binding
    provenance:
      source: README default v0 HS oligo panel
      source_status: assumption_based_seed_panel

