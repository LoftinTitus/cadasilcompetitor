      glytoucan_accession: null
      canonical_wurcs: WURCS=2.0/2,4,3/[a2122A-1a_1-5][a2122h-1b_1-5_2*NSO/3=O/3=O]/1-2-1-2/a4-b1_b3-c1_c4-d1
      atomistic_preparation_status: canonical_wurcs_defined_accession_unavailable
